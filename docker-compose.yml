services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: contractview
      POSTGRES_PASSWORD: contractview
      POSTGRES_DB: contractview_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contractview -d contractview_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: production
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    profiles:
      - prod

  app-dev:
    build:
      context: .
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_dev_node_modules:/app/node_modules
    profiles:
      - dev

volumes:
  app_dev_node_modules:
  postgres_data:
