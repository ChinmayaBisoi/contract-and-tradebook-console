services:
  app:
    build:
      context: .
      target: production
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    profiles:
      - prod

  app-dev:
    build:
      context: .
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_dev_node_modules:/app/node_modules
    profiles:
      - dev

volumes:
  app_dev_node_modules:
