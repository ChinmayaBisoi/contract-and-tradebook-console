name: Deploy To AWS

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, migrate, and deploy
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
      LOG_GROUP: ${{ vars.ECS_LOG_GROUP }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:ci

      - name: Test
        run: bun run test

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build Next.js standalone app
        run: bun run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push production image
        id: image
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --target production -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: bun run db:deploy

      - name: Render ECS task definition
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          TASK_FAMILY: ${{ env.TASK_FAMILY }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}
          LOG_GROUP: ${{ env.LOG_GROUP }}
          EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
          TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
          DATABASE_URL_SECRET_ARN: ${{ vars.DATABASE_URL_SECRET_ARN }}
          DIRECT_URL_SECRET_ARN: ${{ vars.DIRECT_URL_SECRET_ARN }}
          CLERK_SECRET_KEY_SECRET_ARN: ${{ vars.CLERK_SECRET_KEY_SECRET_ARN }}
          UPLOADTHING_TOKEN_SECRET_ARN: ${{ vars.UPLOADTHING_TOKEN_SECRET_ARN }}
          OPENAI_API_KEY_SECRET_ARN: ${{ vars.OPENAI_API_KEY_SECRET_ARN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL }}
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          UPLOADTHING_WORKBOOK_ACL: ${{ vars.UPLOADTHING_WORKBOOK_ACL }}
          OPENAI_MAPPING_MODEL: ${{ vars.OPENAI_MAPPING_MODEL }}
        run: >
          node scripts/aws/render-ecs-task-definition.mjs
          aws/task-definition.json
          aws/task-definition.rendered.json

      - name: Deploy ECS service
        env:
          TASK_DEFINITION_PATH: aws/task-definition.rendered.json
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_SERVICE: ${{ env.ECS_SERVICE }}
        run: ./scripts/aws/deploy-ecs.sh

      - name: Smoke check CloudFront
        env:
          CLOUDFRONT_URL: ${{ secrets.CLOUDFRONT_URL }}
          APP_ROOT_MARKER: ContractView
        run: ./scripts/aws/smoke-check.sh

      - name: Log deployment URL
        env:
          CLOUDFRONT_URL: ${{ secrets.CLOUDFRONT_URL }}
        run: |
          echo "Deployment URL: ${CLOUDFRONT_URL}"
          {
            echo "## Deployment Complete"
            echo
            echo "- Deployment URL: ${CLOUDFRONT_URL}"
            echo "- Image tag: ${IMAGE_TAG}"
          } >> "${GITHUB_STEP_SUMMARY}"
