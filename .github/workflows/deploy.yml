name: Deploy To EC2

on:
  push:
    branches:
      - staging
      - main

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, migrate, and deploy
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    defaults:
      run:
        working-directory: .

    env:
      APP_NAME: contract-console
      REMOTE_RELEASES_ROOT: /opt/contract-console/releases
      REMOTE_DEPLOY_SCRIPT: /opt/contract-console/releases/${{ github.sha }}/scripts/ec2/deploy.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:ci

      - name: Test
        run: bun run test

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build Next.js standalone app
        run: bun run build

      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: bun run db:deploy

      - name: Prepare standalone artifact
        run: |
          rm -rf dist
          mkdir -p dist/.next
          cp -R .next/standalone/. dist/
          cp -R .next/static dist/.next/static
          cp -R public dist/public
          cp -R scripts dist/scripts

      - name: Configure SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Upload release to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new "$EC2_USER@$EC2_HOST" "mkdir -p $REMOTE_RELEASES_ROOT/${GITHUB_SHA}"
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" dist/ "$EC2_USER@$EC2_HOST:$REMOTE_RELEASES_ROOT/${GITHUB_SHA}/"

      - name: Activate release and check health
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new "$EC2_USER@$EC2_HOST" "sudo bash $REMOTE_DEPLOY_SCRIPT $REMOTE_RELEASES_ROOT/${GITHUB_SHA}"
